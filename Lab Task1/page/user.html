<!DOCTYPE html>
<html lang="en-US">
    <head>
        <title> SignUp </title>
        <link rel="stylesheet" href="../Design/Style.css">
    </head>
    <body>
        <div class = "container">
       
        <fieldset>
            <legend> Student Information </legend>
    
            <form>
            <table>
                <tr> 
                    <td><label for ="name">Full Name (Text) : </label></td>
                    
            
                    <td><label for ="Email"> Email Address : </label></td>
                </tr>
                <tr>  
                    <td><input type ="text" id ="name" name="name" placeholder="Enter Your full Name"></td>
                
                
                    <td><input type ="email" id ="Email" name="Email" placeholder="your email@example.com"></td>
                </tr>
                <tr>
                    <td><label for ="Password"> Password: </label> </td>
                    <td><label for ="Age"> Age (Number): </label></td> 
                </tr>
                <tr>
                     <td><input type="password" id="Password" name="Password" placeholder="Enter Your password"></td>
                     <td><input type="number" id="Age" name="Age" placeholder="Enter Your Age"></td>
                </tr>
                <tr>
                    <td><label for ="Experiment Date"> Experiment Date : </label> </td>
                    <td><label for ="Phone"> Phone Number : </label></td>
                </tr>
                <tr>
                    <td><input type ="date" id ="ExperimentDate" name="ExperimentDate"></td>
                    <td><input type ="text" id ="Phone" name="Phone" placeholder="+880 xxxx xxxxxxx"></td>
                </tr>



                 </table> 
        </fieldset>
 
        <input type = "submit" id ="submit" name ="submit" value =SignUp>
        <input type = "reset" id ="Clear" name ="Clear" value =Clear>


        </form>
          </div>
    </body>
</html
